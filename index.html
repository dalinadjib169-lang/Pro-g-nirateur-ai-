<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>المربي DZ</title>
    <meta name="description" content="المساعد الذكي للأستاذ لتوليد المذكرات" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <style>
      body { margin: 0; background-color: #0a0a0a; color: #fbbf24; }
      .splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; direction: rtl; }
      .spinner { width: 50px; height: 50px; border: 4px solid rgba(251, 191, 36, 0.3); border-top-color: #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash">
        <div class="spinner"></div>
        <h2>جاري التحميل...</h2>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
